spring:
  application:
    name: agenda-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agenda_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:agenda_user}
    password: ${DB_PASSWORD:agenda_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

aplicacion:
  cors:
    origenes-permitidos: ${CORS_ORIGENES:http://localhost:4200}
  jwt:
    secreto: ${JWT_SECRETO:cambio-este-secreto-en-desarrollo}
    issuer: agenda-backend
    minutos-acceso: 15
    dias-refresh: 7

server:
  port: 8080

