spring:
  application:
    name: agenda-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3302}/${DB_NAME:agenda_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:agenda_user}
    password: ${DB_PASSWORD:agenda_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

aplicacion:
  cors:
    origenes-permitidos: ${CORS_ORIGENES:http://localhost:4200,http://127.0.0.1:4200}
  jwt:
    secreto: ${JWT_SECRETO:cambio-este-secreto-en-desarrollo}
    issuer: agenda-backend
    minutos-acceso: 15
    dias-refresh: 7
  correo:
    habilitado: ${CORREO_HABILITADO:false}
    proveedor-por-defecto: ${CORREO_PROVEEDOR_POR_DEFECTO:SMTP}
    remitente-por-defecto: ${CORREO_REMITENTE_POR_DEFECTO:no-reply@agenda.local}
    nombre-remitente-por-defecto: ${CORREO_NOMBRE_REMITENTE_POR_DEFECTO:Agenda Web}
    responder-a-por-defecto: ${CORREO_RESPONDER_A_POR_DEFECTO:}
    graph-tenant-id: ${CORREO_GRAPH_TENANT_ID:}
    graph-client-id: ${CORREO_GRAPH_CLIENT_ID:}
    graph-client-secret: ${CORREO_GRAPH_CLIENT_SECRET:}
    graph-user-id: ${CORREO_GRAPH_USER_ID:}
    graph-certificate-thumbprint: ${CORREO_GRAPH_CERTIFICATE_THUMBPRINT:}
    graph-private-key-pem: ${CORREO_GRAPH_PRIVATE_KEY_PEM:}
    llave-cifrado-secretos: ${CORREO_LLAVE_CIFRADO_SECRETOS:}
    lote-maximo-outbox: ${CORREO_LOTE_MAXIMO_OUTBOX:20}
    retraso-reintento-segundos: ${CORREO_REINTENTO_SEGUNDOS:60}

server:
  port: 8080
