services:
  mysql:
    image: mysql:8.0
    container_name: agenda-mysql
    stop_grace_period: 30s
    environment:
      MYSQL_DATABASE: agenda_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: agenda_user
      MYSQL_PASSWORD: agenda_pass
    ports:
      - "3302:3306"
    volumes:
      - agenda_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: agenda-backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-agenda_db}
      DB_USER: ${DB_USER:-agenda_user}
      DB_PASSWORD: ${DB_PASSWORD:-agenda_pass}
      JWT_SECRETO: ${JWT_SECRETO:-cambio-este-secreto-en-desarrollo}
      WHATSAPP_HABILITADO: ${WHATSAPP_HABILITADO:-true}
      WHATSAPP_EMPRESA_ID: ${WHATSAPP_EMPRESA_ID:-1}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_SOLICITUD_CONFIRMACION_SID: ${TWILIO_WHATSAPP_TEMPLATE_SOLICITUD_CONFIRMACION_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_REPROGRAMADA_PENDIENTE_SID: ${TWILIO_WHATSAPP_TEMPLATE_REPROGRAMADA_PENDIENTE_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_CONFIRMACION_SID: ${TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_CONFIRMACION_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_CITA_CONFIRMADA_SID: ${TWILIO_WHATSAPP_TEMPLATE_CITA_CONFIRMADA_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_SID: ${TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_CANCELACION_SID: ${TWILIO_WHATSAPP_TEMPLATE_CANCELACION_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_LIBERADA_SIN_CONFIRMACION_SID: ${TWILIO_WHATSAPP_TEMPLATE_LIBERADA_SIN_CONFIRMACION_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_GRACIAS_VISITA_SID: ${TWILIO_WHATSAPP_TEMPLATE_GRACIAS_VISITA_SID:-}
      TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_REGRESO_SID: ${TWILIO_WHATSAPP_TEMPLATE_RECORDATORIO_REGRESO_SID:-}
    ports:
      - "8080:8080"

volumes:
  agenda_mysql_data:
