<nav class="navbar navbar-expand-lg sticky-top site-header">
  <div class="container header-shell">
    <a class="navbar-brand brand-lockup" routerLink="/">
      <img src="/NailArt_logo.jpeg" alt="Logo NailArt Studio" class="brand-logo">
      <span class="brand-copy">
        <strong>NailArt Studio</strong>
        <small>Boutique de manicura y pedicura</small>
      </span>
    </a>

    <button
      class="navbar-toggler header-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Mostrar navegación"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="collapse navbar-collapse header-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center header-nav">
        <li class="nav-item">
          <a
            class="nav-link header-link"
            routerLink="/"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link header-link" routerLink="/servicios" routerLinkActive="active-link">
            Servicios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link header-link" routerLink="/" fragment="nosotros">
            Nosotros
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link header-link" routerLink="/contacto" routerLinkActive="active-link">
            Contacto
          </a>
        </li>

        <li class="nav-item" *ngIf="!autenticadoVisible()">
          <a class="nav-link header-link header-link-soft" routerLink="/login" routerLinkActive="active-link">
            Iniciar sesión
          </a>
        </li>
        <li class="nav-item" *ngIf="!autenticadoVisible()">
          <a class="nav-link header-link header-link-soft" routerLink="/registro" routerLinkActive="active-link">
            Registro
          </a>
        </li>
        <li class="nav-item" *ngIf="autenticadoVisible()">
          <a class="nav-link header-link header-link-soft" [routerLink]="rutaPanelVisible()" routerLinkActive="active-link">
            Mi panel
          </a>
        </li>
        <li class="nav-item" *ngIf="autenticadoVisible()">
          <button type="button" class="nav-link header-link header-link-soft border-0 bg-transparent" (click)="logout()">
            Cerrar sesión
          </button>
        </li>

        <li class="nav-item header-cta" *ngIf="!autenticadoVisible()">
          <a routerLink="/agendar" class="btn btn-primary rounded-pill">Reservar</a>
        </li>
        <li class="nav-item header-cta" *ngIf="autenticadoVisible()">
          <a [routerLink]="rutaPanelVisible()" class="btn btn-primary rounded-pill">Ir a mi panel</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
