<section class="section-padding">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold gradient-text">Nuestros Servicios</h1>
      <p class="lead text-light opacity-75">Explora nuestra amplia gama de tratamientos para manos y pies con estilo y elegancia.</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-6" *ngFor="let cat of categories">
        <div class="card service-card h-100 card-custom overflow-hidden">
          <div class="row g-0 h-100">
            <div class="col-md-5">
              <div class="service-img-container h-100">
                <img [src]="cat.image" class="service-img" [alt]="cat.name">
              </div>
            </div>
            <div class="col-md-7">
              <div class="card-body p-4">
                <h2 class="h4 fw-bold mb-4 service-title text-accent">{{ cat.name }}</h2>
                <ul class="list-unstyled">
                  <li *ngFor="let item of cat.items" class="d-flex justify-content-between align-items-center mb-3 service-item">
                    <span class="fw-medium text-light opacity-75">{{ item.name }}</span>
                    <span class="price-badge">{{ item.price }}</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
