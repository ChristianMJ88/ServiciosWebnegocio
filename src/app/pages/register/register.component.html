<section class="section-padding bg-dark-custom min-vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-xl-5">
        <div class="card card-custom p-4 p-lg-5">
          <div class="text-center mb-4">
            <h1 class="h2 fw-bold gradient-text mb-2">Crear Cuenta</h1>
            <p class="text-light opacity-75 mb-0">Regístrate para consultar y administrar tus citas.</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label text-light opacity-75 small fw-semibold">Nombre completo</label>
              <input type="text" formControlName="nombreCompleto" class="form-control bg-white bg-opacity-10 border-secondary text-light"
                     placeholder="Ana García" [class.is-invalid]="f['nombreCompleto'].touched && f['nombreCompleto'].invalid">
            </div>

            <div class="mb-3">
              <label class="form-label text-light opacity-75 small fw-semibold">Correo</label>
              <input type="email" formControlName="correo" class="form-control bg-white bg-opacity-10 border-secondary text-light"
                     placeholder="ana@mail.com" [class.is-invalid]="f['correo'].touched && f['correo'].invalid">
            </div>

            <div class="mb-3">
              <label class="form-label text-light opacity-75 small fw-semibold">Teléfono</label>
              <input type="tel" formControlName="telefono" class="form-control bg-white bg-opacity-10 border-secondary text-light"
                     placeholder="5512345678" [class.is-invalid]="f['telefono'].touched && f['telefono'].invalid">
            </div>

            <div class="mb-3">
              <label class="form-label text-light opacity-75 small fw-semibold">Contraseña</label>
              <input type="password" formControlName="contrasena" class="form-control bg-white bg-opacity-10 border-secondary text-light"
                     placeholder="Mínimo 8 caracteres" [class.is-invalid]="f['contrasena'].touched && f['contrasena'].invalid">
            </div>

            <div *ngIf="error" class="alert alert-danger bg-danger bg-opacity-10 border-danger text-light small">
              {{ error }}
            </div>

            <div *ngIf="completed()" class="alert alert-success bg-success bg-opacity-10 border-success text-light small">
              Registro completado. Redirigiendo al inicio de sesión...
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary rounded-pill py-3" [disabled]="loading() || completed()">
                <span *ngIf="!loading()">Crear cuenta</span>
                <span *ngIf="loading()" class="spinner-border spinner-border-sm me-2"></span>
              </button>
            </div>
          </form>

          <p class="text-center text-light opacity-75 small mt-4 mb-0">
            ¿Ya tienes cuenta?
            <a routerLink="/login" class="text-accent text-decoration-none fw-semibold">Inicia sesión</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
