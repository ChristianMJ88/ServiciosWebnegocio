<app-header></app-header>

<main class="min-vh-100">
  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>

<!-- Botón de WhatsApp Flotante -->
<a href="https://wa.me/+12673136057?text=Hola%20quiero%20agendar%20una%20cita" class="whatsapp-float shadow-lg" target="_blank" title="Contáctanos por WhatsApp">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" width="35" height="35" />
</a>

<!-- Chatbot Flotante -->
<div class="chatbot-wrapper shadow-lg" [class.open]="isChatOpen()">
  <div class="chat-header d-flex justify-content-between align-items-center px-3 py-2" (click)="toggleChat()">
    <span class="fw-bold">¿Dudas? Chat con nosotros</span>
    <span class="chat-toggle-icon">{{ isChatOpen() ? '−' : '+' }}</span>
  </div>

  <div class="chat-body p-3 bg-white" *ngIf="isChatOpen()">
    <p class="mb-3">Hola 👋 ¿En qué podemos ayudarte?</p>
    <div class="d-grid gap-2 mb-3">
      <button class="btn btn-outline-primary btn-sm" (click)="clickChatOption('precios')">Ver Precios</button>
      <button class="btn btn-outline-primary btn-sm" (click)="clickChatOption('citas')">¿Cómo agendar?</button>
      <button class="btn btn-outline-primary btn-sm" (click)="clickChatOption('ubicación')">Ubicación</button>

    </div>

    <div class="chat-response p-2 rounded bg-light border" *ngIf="chatMsg()">
      {{ chatMsg() }}
    </div>
  </div>
</div>
